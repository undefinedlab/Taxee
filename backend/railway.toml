# Shared backend folder — do NOT put start/build/preDeploy here.
# Railway applies this file to EVERY service whose Root Directory is "backend".
#
# Per-service config (set in Railway dashboard):
#
# API (default railpack.json):
#   Pre-deploy:  pnpm db:migrate
#   Healthcheck: /health
#
# Telegram bot:
#   RAILPACK_CONFIG_FILE=railpack.telegram-bot.json
#   No healthcheck (no HTTP server)
#
# Agent worker:
#   RAILPACK_CONFIG_FILE=railpack.agent.json
#
# MCP server:
#   RAILPACK_CONFIG_FILE=railpack.mcp-server.json
