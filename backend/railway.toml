# Railway config for the @taxee/api service.
# Set the service Root Directory to "backend" in the Railway dashboard.
#
# Worker services (same repo, root directory "backend"):
#   RAILPACK_CONFIG_FILE=railpack.agent.json
#   RAILPACK_CONFIG_FILE=railpack.telegram-bot.json
#   RAILPACK_CONFIG_FILE=railpack.mcp-server.json

[build]
buildCommand = "pnpm turbo run build --filter=@taxee/api..."

[deploy]
startCommand = "node apps/api/dist/index.js"
preDeployCommand = ["pnpm db:migrate"]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
